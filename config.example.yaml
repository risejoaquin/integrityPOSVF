server:
  port: "8080"
  read_timeout: 10
  write_timeout: 15

database:
  host: "localhost"
  port: 5432
  user: "integritypos"
  password: "solidbitpassword"
  dbname: "integritypos"
  sslmode: "disable"

printer:
  type: "usb" # usb, tcp, none
  device_path: "/dev/usb/lp0"
  tcp_addr: ""

whatsapp:
  enabled: false
  token: "YOUR_META_TOKEN"
  phone_number_id: "YOUR_PHONE_ID"
  verify_token: "YOUR_VERIFY_TOKEN"

ai:
  enabled: false
  api_key: "YOUR_GEMINI_KEY"
  model: "gemini-2.5-flash"

auth:
  admin_user: "admin"
  admin_password: "adminpassword"

cors:
  enabled: true
  allowed_origins:
    - "*"
  allowed_methods:
    - "GET"
    - "POST"
    - "PUT"
    - "DELETE"
    - "OPTIONS"
  allowed_headers:
    - "Content-Type"
    - "Authorization"
  allow_credentials: false
  max_age: 86400

rate_limit:
  enabled: true
  requests_per_minute: 100
  cleanup_interval_min: 5

business_info:
  name: "My Business"
  color: "#3498db"
